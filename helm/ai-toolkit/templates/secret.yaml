apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-toolkit.secretName" . }}
  labels:
    {{- include "ai-toolkit.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
type: Opaque
stringData:
  postgres-password: {{ if .Values.postgresql.enabled }}{{ required "postgresql.auth.password is required" .Values.postgresql.auth.password | quote }}{{ else }}{{ required "externalDatabase.password is required when postgresql.enabled is false" .Values.externalDatabase.password | quote }}{{ end }}
  litellm-master-key: {{ required "litellm.masterKey is required" .Values.litellm.masterKey | quote }}
  litellm-salt-key: {{ required "litellm.saltKey is required" .Values.litellm.saltKey | quote }}
  ollama-api-key: {{ required "litellm.ollamaApiKey is required" .Values.litellm.ollamaApiKey | quote }}
