{{- if .Values.redis.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-toolkit.fullname" . }}-redis
  labels:
    {{- include "ai-toolkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ai-toolkit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        {{- include "ai-toolkit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.redis.image.repository }}:{{ .Values.redis.image.tag }}"
          imagePullPolicy: {{ .Values.redis.image.pullPolicy }}
          ports:
            - name: redis
              containerPort: 6379
              protocol: TCP
          {{- if .Values.redis.auth.password }}
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-toolkit.secretName" . }}
                  key: redis-password
          command:
            - sh
            - -c
            - exec redis-server --appendonly yes --requirepass "$REDIS_PASSWORD"
          {{- else }}
          command:
            - redis-server
            - --appendonly
            - "yes"
          {{- end }}
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket:
              port: redis
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - {{ if .Values.redis.auth.password }}redis-cli -a "$REDIS_PASSWORD" --no-auth-warning ping{{ else }}redis-cli ping{{ end }}
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          {{- with .Values.redis.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.redis.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: data
          {{- if .Values.redis.persistence.enabled }}
          persistentVolumeClaim:
            claimName: {{ .Values.redis.persistence.existingClaim | default (printf "%s-redis" (include "ai-toolkit.fullname" .)) }}
          {{- else }}
          emptyDir: {}
          {{- end }}
{{- end }}
