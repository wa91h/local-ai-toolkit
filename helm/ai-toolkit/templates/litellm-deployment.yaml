{{- if .Values.litellm.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-toolkit.fullname" . }}-litellm
  labels:
    {{- include "ai-toolkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: litellm
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ai-toolkit.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: litellm
  template:
    metadata:
      labels:
        {{- include "ai-toolkit.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: litellm
    spec:
      containers:
        - name: litellm
          image: "{{ .Values.litellm.image.repository }}:{{ .Values.litellm.image.tag }}"
          imagePullPolicy: {{ .Values.litellm.image.pullPolicy }}
          args: ["--config", "/app/config.yaml", "--detailed_debug"]
          ports:
            - name: http
              containerPort: 4000
              protocol: TCP
          env:
            - name: LITELLM_MASTER_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-toolkit.secretName" . }}
                  key: litellm-master-key
            - name: LITELLM_SALT_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-toolkit.secretName" . }}
                  key: litellm-salt-key
            {{- if .Values.litellm.ollamaCloud.enabled }}
            - name: OLLAMA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-toolkit.secretName" . }}
                  key: ollama-api-key
            {{- end }}
            - name: STORE_MODEL_IN_DB
              value: "True"
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-toolkit.secretName" . }}
                  key: postgres-password
            - name: DATABASE_URL
              value: "postgresql://{{ include "ai-toolkit.postgresUser" . }}:$(POSTGRES_PASSWORD)@{{ include "ai-toolkit.postgresHost" . }}:{{ include "ai-toolkit.postgresPort" . }}/litellm"
            {{- with .Values.litellm.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          volumeMounts:
            - name: config
              mountPath: /app/config.yaml
              subPath: config.yaml
          livenessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /health/liveliness
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
            timeoutSeconds: 5
          {{- with .Values.litellm.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.litellm.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      volumes:
        - name: config
          configMap:
            name: {{ include "ai-toolkit.fullname" . }}-litellm-config
{{- end }}
