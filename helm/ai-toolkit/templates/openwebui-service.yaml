{{- if .Values.openwebui.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "ai-toolkit.fullname" . }}-openwebui
  labels:
    {{- include "ai-toolkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: openwebui
spec:
  type: {{ .Values.openwebui.service.type }}
  ports:
    - port: {{ .Values.openwebui.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "ai-toolkit.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: openwebui
{{- end }}
