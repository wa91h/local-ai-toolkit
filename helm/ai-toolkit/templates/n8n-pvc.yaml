{{- if and .Values.n8n.enabled .Values.n8n.persistence.enabled (not .Values.n8n.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-toolkit.fullname" . }}-n8n
  labels:
    {{- include "ai-toolkit.labels" . | nindent 4 }}
    app.kubernetes.io/component: n8n
spec:
  accessModes:
    {{- toYaml .Values.n8n.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.n8n.persistence.size }}
  {{- if .Values.n8n.persistence.storageClass }}
  storageClassName: {{ .Values.n8n.persistence.storageClass }}
  {{- end }}
{{- end }}
