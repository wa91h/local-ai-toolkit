apiVersion: v2
name: ai-toolkit
description: Self-hosted AI stack — LiteLLM gateway, n8n automation, and Open WebUI backed by PostgreSQL
type: application
version: 0.2.0
appVersion: "0.3.0"
home: https://github.com/wa91h/local-ai-toolkit
sources:
  - https://github.com/wa91h/local-ai-toolkit
keywords:
  - ai
  - llm
  - litellm
  - n8n
  - openwebui
  - ollama
maintainers:
  - name: wa91h
    email: w.ourimi@gmail.com
    url: https://github.com/wa91h
annotations:
  artifacthub.io/license: MIT
  artifacthub.io/changes: |
    - kind: added
      description: n8n queue mode with bundled Redis or externalRedis, plus dedicated worker Deployment
    - kind: added
      description: Optional Ollama Cloud model catalog via litellm.ollamaCloud.{enabled,apiKey,models}
    - kind: added
      description: litellm.extraModels for registering non-Ollama providers in model_list
    - kind: added
      description: Pre-flight validation guards for Redis backend and Ollama Cloud API key
    - kind: changed
      description: "Breaking — replaced litellm.ollamaApiKey with litellm.ollamaCloud.apiKey, and litellm.config with structured ollamaCloud.models + extraModels"
