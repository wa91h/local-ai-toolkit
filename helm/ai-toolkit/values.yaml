# ─── n8n ─────────────────────────────────────────────────────────────────────
# n8n is a visual workflow automation tool (similar to Zapier / Make).
# It uses PostgreSQL for workflow and execution history storage.
# The editor UI is available at <host>/ after deployment.
# Note: N8N_SECURE_COOKIE is forced to false because there is no HTTPS by default.
#       If you add TLS via Ingress, you can override this in the deployment template.

n8n:
  # Set to false to skip deploying n8n (e.g. if you don't need workflow automation).
  enabled: true

  image:
    repository: docker.n8n.io/n8nio/n8n
    # "latest" always pulls the newest n8n release.
    # For production, pin to a specific version: e.g. "1.45.0"
    tag: latest
    pullPolicy: IfNotPresent

  service:
    # ClusterIP is recommended — expose via Ingress for external access.
    type: ClusterIP
    port: 5678

  persistence:
    # Stores workflow definitions, credentials, and execution logs.
    # Disable only for ephemeral/test environments.
    enabled: true
    # 1Gi is sufficient for most workflows. Increase if you run many
    # large executions or store binary data in n8n.
    size: 1Gi
    storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ─── Open WebUI ──────────────────────────────────────────────────────────────
# Open WebUI is a ChatGPT-like interface that connects to LiteLLM.
# It is pre-configured to point at the LiteLLM service inside the cluster
# using the litellm.masterKey as its API key — no manual setup needed.
# The chat interface is available at <host>/ after deployment.

openwebui:
  # Set to false to skip deploying Open WebUI (e.g. if you use a different chat frontend).
  enabled: true

  image:
    repository: ghcr.io/open-webui/open-webui
    # "main" tracks the latest build. Pin to a release tag for stability:
    # e.g. "v0.3.10"
    tag: main
    pullPolicy: IfNotPresent

  service:
    type: ClusterIP
    port: 8080

  persistence:
    # Stores user accounts, chat history, and UI settings.
    # Disable only for stateless/demo environments.
    enabled: true
    # 2Gi covers typical chat history. Increase if you upload many files
    # through the Open WebUI document feature.
    size: 2Gi
    storageClass: ""

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

# ─── Ingress ─────────────────────────────────────────────────────────────────
# Exposes services via an Ingress controller (e.g. ingress-nginx, Traefik).
# Each service gets its own hostname. Leave a host empty to skip that service.
# All three services share the same Ingress resource and TLS config.
#
# Minimal example (nginx, no TLS):
#   ingress:
#     enabled: true
#     className: nginx
#     hosts:
#       litellm: litellm.example.com
#       n8n: n8n.example.com
#       openwebui: chat.example.com
#
# With cert-manager TLS:
#   ingress:
#     enabled: true
#     className: nginx
#     annotations:
#       cert-manager.io/cluster-issuer: letsencrypt-prod
#     hosts:
#       litellm: litellm.example.com
#       n8n: n8n.example.com
#       openwebui: chat.example.com
#     tls:
#       - secretName: ai-toolkit-tls
#         hosts:
#           - litellm.example.com
#           - n8n.example.com
#           - chat.example.com

ingress:
  # Set to true to create an Ingress resource.
  enabled: false

  # IngressClass to use. Depends on your cluster setup.
  # Common values: "nginx", "traefik", "alb" (AWS)
  className: ""

  # Annotations passed directly to the Ingress resource.
  # Use these to configure controller-specific behaviour (TLS, rate limiting, etc.)
  annotations: {}
  # Examples:
  #   nginx.ingress.kubernetes.io/proxy-body-size: "50m"
  #   nginx.ingress.kubernetes.io/proxy-read-timeout: "600"

  hosts:
    # Hostname for the LiteLLM API + admin UI (/ui).
    # Leave empty ("") to not expose this service via Ingress.
    litellm: ""
    # Hostname for the n8n workflow editor.
    n8n: ""
    # Hostname for the Open WebUI chat interface.
    openwebui: ""

  # TLS configuration. Each entry maps a secret name to one or more hostnames.
  # The secret must contain a valid TLS certificate (managed manually or by cert-manager).
  tls: []
  # Example:
  #   - secretName: ai-toolkit-tls
  #     hosts:
  #       - litellm.example.com
  #       - n8n.example.com
  #       - chat.example.com
