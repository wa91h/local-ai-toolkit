# ─── n8n ─────────────────────────────────────────────────────────────────────

n8n:
  image:
    repository: docker.n8n.io/n8nio/n8n
    tag: latest
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 5678
  persistence:
    enabled: true
    size: 1Gi
    storageClass: ""
  resources: {}

# ─── Open WebUI ──────────────────────────────────────────────────────────────

openwebui:
  image:
    repository: ghcr.io/open-webui/open-webui
    tag: main
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8080
  persistence:
    enabled: true
    size: 2Gi
    storageClass: ""
  resources: {}

# ─── Ingress ─────────────────────────────────────────────────────────────────

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    litellm: ""
    n8n: ""
    openwebui: ""
  tls: []
