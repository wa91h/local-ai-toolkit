          api_key: os.environ/OLLAMA_API_KEY
      - model_name: gpt-oss:20b-cloud
        litellm_params:
          model: ollama_chat/gpt-oss:20b-cloud
          api_base: https://ollama.com
          api_key: os.environ/OLLAMA_API_KEY
      - model_name: gemma3:27b-cloud
        litellm_params:
          model: ollama_chat/gemma3:27b-cloud
          api_base: https://ollama.com
          api_key: os.environ/OLLAMA_API_KEY
      - model_name: gemma3:12b-cloud
        litellm_params:
