# ─── Namespace ───────────────────────────────────────────────────────────────
# Helm does not support a default namespace inside the chart. Always install with:
#   helm install ai-toolkit . --namespace ai-toolkit --create-namespace
# Omitting --namespace deploys into the "default" namespace.

# ─── Release naming ──────────────────────────────────────────────────────────
# By default, resource names are prefixed with the Helm release name.
# e.g. a release named "prod" produces "prod-ai-toolkit-litellm", etc.
#
# nameOverride replaces only the chart name portion:
#   nameOverride: "ai"  →  "prod-ai-litellm"
#
# fullnameOverride replaces the entire prefix:
#   fullnameOverride: "toolkit"  →  "toolkit-litellm"
nameOverride: ""
fullnameOverride: ""

# Timezone passed to n8n for cron scheduling and log timestamps.
# Use IANA format: https://en.wikipedia.org/wiki/List_of_tz_database_time_zones
# Examples: America/New_York | Europe/Paris | Asia/Tokyo | Africa/Tunis
timezone: UTC

# ─── PostgreSQL ──────────────────────────────────────────────────────────────
# A single PostgreSQL 16 instance shared by LiteLLM and n8n.
# The initdbScript runs once on first volume creation and creates the
# service-specific databases (n8n, litellm) inside the instance.
#
# To use an external database (e.g. RDS, Cloud SQL, existing cluster PG):
#   1. Set postgresql.enabled: false
#   2. Fill in the externalDatabase section below
#   The external server must already have "n8n" and "litellm" databases created.

postgresql:
  # Set to false to skip deploying PostgreSQL and use externalDatabase instead.
  enabled: true

  image:
    repository: postgres
    # Pinned to 16-alpine to match the Docker Compose setup.
    # Upgrade by changing the tag — no other changes needed.
    tag: "16-alpine"
    # IfNotPresent: use cached image if available (good for production).
    # Always: always pull (useful when using mutable tags like "latest").
    pullPolicy: IfNotPresent

  auth:
    # Superuser username created on first boot.
    username: postgres
    # REQUIRED. Minimum 16 characters recommended.
    # Pass at install time:  --set postgresql.auth.password=<value>
    # Or store in a separate values file that is never committed.
    password: ""
    # The default database created on first boot.
    # LiteLLM and n8n each get their own database via initdbScript below.
    database: postgres

  service:
    # Internal cluster port. Only change if you have a port conflict.
    port: 5432

  persistence:
    # enabled: true  → data survives pod restarts (strongly recommended)
    # enabled: false → data is lost when the pod restarts (dev/test only)
    enabled: true
    # Size of the PersistentVolumeClaim. Increase if you expect large workflow
    # or LiteLLM audit log data. Cannot be reduced after creation.
    size: 5Gi
    # storageClass: ""       → use the cluster's default StorageClass
    # storageClass: "gp2"    → AWS EBS gp2
    # storageClass: "standard" → GKE standard persistent disk
    storageClass: ""

  # CPU/memory limits and requests. Sized for a small production workload.
  # Increase memory if you run many large workflows or have heavy audit logging.
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi

  # Container-level security settings applied to the PostgreSQL pod.
  # allowPrivilegeEscalation: false — prevents the process from gaining more
  #   privileges than its parent (blocks sudo / setuid binaries).
  # capabilities.drop: [ALL] — removes all Linux capabilities (NET_ADMIN,
  #   SYS_ADMIN, etc.) that a database process never needs.
  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Shell script executed once when the PostgreSQL volume is first initialised.
  # Creates the "n8n" and "litellm" databases inside the shared instance.
  # $POSTGRES_USER and $POSTGRES_DB are injected automatically by the
  # official postgres Docker image at startup.
  # Only modify this if you need additional databases or extensions.
  initdbScript: |
    #!/bin/bash
    set -e
    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE DATABASE n8n;" || true
    psql -v ON_ERROR_STOP=1 -U "$POSTGRES_USER" -d "$POSTGRES_DB" -c "CREATE DATABASE litellm;" || true
    echo "Databases created successfully"

# Settings used when postgresql.enabled is false.
# The host must be reachable from inside the cluster (use a K8s Service name
# or an external hostname, not "localhost").
externalDatabase:
  # Example: "my-postgres.default.svc.cluster.local" or "db.example.com"
  host: ""
  port: 5432
  username: postgres
  password: ""
  # The admin/default database (used to build the connection URL).
  # "n8n" and "litellm" databases must already exist on the server.
  database: postgres

# ─── LiteLLM ─────────────────────────────────────────────────────────────────
# LiteLLM is an OpenAI-compatible API gateway that proxies requests to
# multiple LLM providers. The admin UI is available at <host>/ui.
# All Ollama Cloud models are pre-configured in the `config` block below.

litellm:
  # Set to false to skip deploying LiteLLM (e.g. if you run it outside the cluster).
  enabled: true

  image:
    repository: docker.litellm.ai/berriai/litellm
    # "main-stable" tracks the latest stable release.
    # Pin to a specific version (e.g. "v1.40.0") for reproducible deploys.
    tag: main-stable
    pullPolicy: IfNotPresent

  # REQUIRED. Used to authenticate every API call to LiteLLM.
  # Must start with "sk-". Generate with: openssl rand -hex 16 | sed 's/^/sk-/'
  # Used as the Bearer token: Authorization: Bearer <masterKey>
  # Open WebUI is automatically configured to use this key.
  masterKey: ""

  # REQUIRED. Internal salt for LiteLLM's key hashing. Must start with "sk-".
  # Generate separately from masterKey: openssl rand -hex 16 | sed 's/^/sk-/'
  # Never share or reuse this value across deployments.
  saltKey: ""

  # REQUIRED. Your Ollama Cloud API key.
  # Obtain from: https://ollama.com → Account → API Keys
  # Used by all models in the `config` block below via os.environ/OLLAMA_API_KEY.
  ollamaApiKey: ""

  service:
    # ClusterIP: only reachable inside the cluster (use Ingress or port-forward).
    # LoadBalancer: exposes a public IP (suitable for cloud environments).
    # NodePort: exposes on a static port on every node.
    type: ClusterIP
    port: 4000

  # CPU/memory limits and requests. LiteLLM loads all model configs into memory
  # at startup — with 37 models 1Gi is the safe minimum.
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: 1000m
      memory: 2Gi

  securityContext:
    allowPrivilegeEscalation: false
    capabilities:
      drop:
        - ALL

  # Full content of the LiteLLM model config (equivalent to config/litellm_config.yaml).
  #
  # Structure of each entry:
  #   model_name:   display name shown in the API and Open WebUI
  #   model:        provider/model-id — "ollama_chat/" prefix routes to Ollama Cloud
  #   api_base:     provider endpoint
  #   api_key:      "os.environ/VAR" tells LiteLLM to read the value from an env var
  #
  # To add a model, append a new entry following the same pattern.
  # To remove models, delete their entries.
  # To override entirely, set this key in your own values file:
  #   litellm:
  #     config: |
  #       model_list:
  #         - model_name: my-model
  #           litellm_params:
  #             model: ollama_chat/my-model-id
  #             api_base: https://ollama.com
  #             api_key: os.environ/OLLAMA_API_KEY
