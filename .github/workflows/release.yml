name: Release Helm Chart

on:
  push:
    branches:
      - main
    paths:
      - "helm/**"
      - "artifacthub-repo.yml"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        with:
          charts_dir: helm
          skip_existing: true
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      - name: Copy artifacthub-repo.yml to gh-pages
        run: |
          git fetch origin gh-pages
          git checkout gh-pages
          cp artifacthub-repo.yml . 2>/dev/null || git checkout main -- artifacthub-repo.yml
          git add artifacthub-repo.yml
          git diff --cached --quiet || git commit -m "chore: sync artifacthub-repo.yml"
          git push origin gh-pages
          git checkout main
