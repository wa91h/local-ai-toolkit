name: Validate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-compose:
    name: Validate docker-compose.yml
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create external network
        run: docker network create ai-toolkit

      - name: Copy env template
        run: cp .env.dist .env

      - name: Validate compose file
        run: docker compose config --quiet

  validate-helm:
    name: Validate Helm chart
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint helm/ai-toolkit
          --set litellm.masterKey=sk-test
          --set litellm.saltKey=sk-test
          --set litellm.ollamaApiKey=test
          --set postgresql.auth.password=test

      - name: Render templates
        run: helm template test-release helm/ai-toolkit
          --set litellm.masterKey=sk-test
          --set litellm.saltKey=sk-test
          --set litellm.ollamaApiKey=test
          --set postgresql.auth.password=test
